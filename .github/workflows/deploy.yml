name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AIRTABLE_PAT: ${{ secrets.VITE_AIRTABLE_PAT }}
          VITE_AIRTABLE_BASE_ID: ${{ secrets.VITE_AIRTABLE_BASE_ID }}
          VITE_AIRTABLE_CHICKENS_BASE_ID: ${{ secrets.VITE_AIRTABLE_CHICKENS_BASE_ID }}
          VITE_AIRTABLE_PM_BASE_ID: ${{ secrets.VITE_AIRTABLE_PM_BASE_ID }}
          VITE_AIRTABLE_DOCS_BASE_ID: ${{ secrets.VITE_AIRTABLE_DOCS_BASE_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_N8N_CHICKENS_WEBHOOK_URL: ${{ secrets.VITE_N8N_CHICKENS_WEBHOOK_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
